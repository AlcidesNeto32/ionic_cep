<ion-header>
  <ion-toolbar>
    <ion-title>Histórico</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content>
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Histórico</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-list>
    <ion-item *ngFor="let item of cepService.historicoCep">
      <ion-label>
        <h2>{{item.cep}}</h2>
        <p>{{item.localidade}} - {{item.uf}}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
